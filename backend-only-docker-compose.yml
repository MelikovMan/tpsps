version: '3.8'

services:
  backend:
    image: ${DOCKER_IMAGE}
    ports:
      - "80:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER}:${DB_PWD}@postgres:5432/wiki_db
      - DATABASE_URL_SYNC=postgresql://${DB_USER}:${DB_PWD}@postgres:5432/wiki_db
      - REDIS_URL=redis://redis:6379/0
      - YANDEX_STORAGE_ACCESS_KEY=${YA_ACCESS_KEY}
      - YANDEX_STORAGE_SECRET_KEY=${YA_SECRET_KEY}
      - YANDEX_STORAGE_BUCKET=${YA_BUCKET}
      - YANDEX_STORAGE_REGION=${YA_REGION}
      - CORS_ORIGINS=${CORS_ORIGINS}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wiki-network

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: wiki_db
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PWD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d wiki_db"]
    networks:
      - wiki-network

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
    networks:
      - wiki-network

volumes:
  postgres_data:

networks:
  wiki-network:
    driver: bridge